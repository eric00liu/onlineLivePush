name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  test:
    name: Test Python, frontend, scripts, and Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run unit and static checks
        run: scripts/dev_check.sh

      - name: Validate OpenAPI JSON
        run: python3 -m json.tool docs/openapi.json >/dev/null

      - name: Validate Docker Compose
        run: |
          docker compose config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.gstreamer.yml config >/dev/null

      - name: Validate smoke script syntax
        run: bash -n scripts/smoke_rtmp.sh scripts/smoke_upload_file.sh scripts/smoke_audio_mix.sh scripts/smoke_compose.sh

